<include href="views/header.html"></include>
<body>
<div class="container">
    <div class="column text-center">
        <h1>Welcome to The Only Diner</h1>
        <h3>Order Part 1</h3>
        <form action="#" method="get" class="form-horizontal">
            <!-- get food -->
            <div class="form-group">
                <label for="food" class="col-sm-4 control-label">What food would you want?</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" name="food" id="food">
                </div>
            </div>
        </form>
    </div>
    <div class="form-group">
        <label class="col-sm-4 control-label">Select a meal</label>
        <div class="col-sm-4">
            <repeat group="{{ @meals }}" value="{{ @meal }}">
                <label><input type="radio" name="meal" value="{{ @meal }}"> {{ ucfirst(@meal) }}</label>
            </repeat>
        </div>
        <button class="btn btn-primary" type="submit">Next</button>
    </div>
</div>
<!-- Optional JavaScript; choose one of the two! -->

<!-- Option 1: Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</html>
